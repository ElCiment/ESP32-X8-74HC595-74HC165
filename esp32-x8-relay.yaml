      - lambda: 'id(relay_state) &= ~(1 << 4);'
      - script.execute: write_relays
  - platform: template
    name: "Relais 6"
    id: sw_relay6
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: 'id(relay_state) |= (1 << 5);'
      - script.execute: write_relays
    turn_off_action:
      - lambda: 'id(relay_state) &= ~(1 << 5);'
      - script.execute: write_relays
  - platform: template
    name: "Relais 7"
    id: sw_relay7
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: 'id(relay_state) |= (1 << 6);'
      - script.execute: write_relays
    turn_off_action:
      - lambda: 'id(relay_state) &= ~(1 << 6);'
      - script.execute: write_relays
  - platform: template
    name: "Relais 8"
    id: sw_relay8
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: 'id(relay_state) |= (1 << 7);'
      - script.execute: write_relays
    turn_off_action:
      - lambda: 'id(relay_state) &= ~(1 << 7);'
      - script.execute: write_relays

binary_sensor:
  - platform: template
    name: "Entree IN1"
    id: bs_in1
  - platform: template
    name: "Entree IN2"
    id: bs_in2
  - platform: template
    name: "Entree IN3"
    id: bs_in3
  - platform: template
    name: "Entree IN4"
    id: bs_in4
  - platform: template
    name: "Entree IN5"
    id: bs_in5
  - platform: template
    name: "Entree IN6"
    id: bs_in6
  - platform: template
    name: "Entree IN7"
    id: bs_in7
  - platform: template
    name: "Entree IN8"
    id: bs_in8

button:
  - platform: template
    name: "TEST - Tous relais ON"
    on_press:
      - lambda: 'id(relay_state) = 0xFF;'
      - script.execute: write_relays
  - platform: template
    name: "TEST - Tous relais OFF"
    on_press:
      - lambda: 'id(relay_state) = 0x00;'
      - script.execute: write_relays